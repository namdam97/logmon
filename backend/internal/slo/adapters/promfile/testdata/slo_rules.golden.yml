        - record: slo:errors:ratio_rate6h
          expr: 1 - (sum(rate(logmon_http_request_duration_seconds_bucket{service="api",le="0.25"}[6h])) / sum(rate(logmon_http_request_duration_seconds_count{service="api"}[6h])))
          labels:
            service: api
            slo: 22222222-2222-2222-2222-222222222222
            window: 6h
            workspace: 00000000-0000-0000-0000-000000000001
        - record: slo:errors:ratio_rate3d
          expr: 1 - (sum(rate(logmon_http_request_duration_seconds_bucket{service="api",le="0.25"}[3d])) / sum(rate(logmon_http_request_duration_seconds_count{service="api"}[3d])))
          labels:
            service: api
            slo: 22222222-2222-2222-2222-222222222222

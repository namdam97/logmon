        - alert: SLOBurnRate_22222222-2222-2222-2222-222222222222_critical
          expr: (slo:errors:ratio_rate1h{slo="22222222-2222-2222-2222-222222222222"} > (14.4 * 0.010000000000000009) and slo:errors:ratio_rate5m{slo="22222222-2222-2222-2222-222222222222"} > (14.4 * 0.010000000000000009)) or (slo:errors:ratio_rate6h{slo="22222222-2222-2222-2222-222222222222"} > (6 * 0.010000000000000009) and slo:errors:ratio_rate30m{slo="22222222-2222-2222-2222-222222222222"} > (6 * 0.010000000000000009))
          for: 2m
          labels:
            service: api
            severity: critical
            slo: 22222222-2222-2222-2222-222222222222
            workspace: 00000000-0000-0000-0000-000000000001
          annotations:
            runbook_url: https://runbooks.logmon.local/slo-burn-rate
            summary: SLO "api latency" (api) burning error budget (critical)
        - alert: SLOBurnRate_22222222-2222-2222-2222-222222222222_warning
          expr: (slo:errors:ratio_rate3d{slo="22222222-2222-2222-2222-222222222222"} > (1 * 0.010000000000000009) and slo:errors:ratio_rate6h{slo="22222222-2222-2222-2222-222222222222"} > (1 * 0.010000000000000009))
          for: 15m
          labels:
            service: api
            severity: warning
            slo: 22222222-2222-2222-2222-222222222222
            workspace: 00000000-0000-0000-0000-000000000001
          annotations:
            runbook_url: https://runbooks.logmon.local/slo-burn-rate
            summary: SLO "api latency" (api) burning error budget (warning)

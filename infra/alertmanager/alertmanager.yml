# Alertmanager config (doc_v2/05 §2) — routing theo severity, inhibition,
# Watchdog deadman switch. Secrets qua *_file (compose secrets, KHÔNG hardcode).
# Receiver `logmon` (GĐ2.3): mirror mọi alert (trừ Watchdog) sang alerting BC
# webhook với continue: true → instance được lưu mà KHÔNG chặn route slack/page.

route:
  group_by: [alertname, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-default
  routes:
    # Deadman switch — route riêng, KHÔNG gom nhóm, ping liên tục ~50s
    # tới healthchecks.io (ADR-026). Ping ngừng = pipeline alerting chết.
    - matchers: ['alertname = "Watchdog"']
      receiver: deadman
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 50s
    # Mirror mọi alert thật (sau Watchdog) sang LogMon. continue: true để vẫn
    # rơi xuống các route slack/page/ticket bên dưới.
    - receiver: logmon
      continue: true
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 5m
    - matchers: ['severity = "critical"']
      receiver: page
      group_wait: 10s
      repeat_interval: 1h
    - matchers: ['severity = "warning"']
      receiver: ticket
      repeat_interval: 12h

# Critical đè warning CÙNG service (tránh alert storm khi service sập).
inhibit_rules:
  - source_matchers: ['severity = "critical"']
    target_matchers: ['severity = "warning"']
    equal: [service]

receivers:
  - name: page
    slack_configs:
      - api_url_file: /run/secrets/slack_webhook_url
        channel: '#alerts-critical'
        send_resolved: true

  - name: ticket
    slack_configs:
      - api_url_file: /run/secrets/slack_webhook_url
        channel: '#alerts'
        send_resolved: true

  - name: slack-default
    slack_configs:
      - api_url_file: /run/secrets/slack_webhook_url
        channel: '#alerts'
        send_resolved: true

  - name: deadman
    webhook_configs:
      - url_file: /run/secrets/healthchecks_url
        send_resolved: false
        max_alerts: 1

  # LogMon alerting BC webhook receiver (GĐ2.3). Bearer token nội bộ phải khớp
  # ALERTMANAGER_WEBHOOK_TOKEN của userservice (xem docker-compose secrets).
  - name: logmon
    webhook_configs:
      - url: http://userservice:8080/api/v1/alerts/webhook
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials_file: /run/secrets/logmon_webhook_token

# LogMon dev stack (Mode A) — postgres + userservice. Mode B (Kafka, ELK) bổ
# sung sau qua profile "scale".
name: logmon

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: logmon
      POSTGRES_PASSWORD: logmon
      POSTGRES_DB: logmon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Migrations chạy tự động lần đầu khởi tạo DB.
      - ../../backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logmon -d logmon"]
      interval: 5s
      timeout: 3s
      retries: 5

  userservice:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      LOG_LEVEL: info
      DATABASE_URL: postgres://logmon:logmon@postgres:5432/logmon?sslmode=disable
      # JWT_SECRET nạp từ env của host; literal chỉ là fallback cho local dev.
      # Production PHẢI set JWT_SECRET (secret manager), KHÔNG dùng giá trị này.
      JWT_SECRET: ${JWT_SECRET:-local-dev-insecure-change-me}
      COOKIE_SECURE: "false"
      ALLOWED_ORIGIN: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:

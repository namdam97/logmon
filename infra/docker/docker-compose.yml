# LogMon dev stack (Mode A) — postgres + userservice + monitoring (Prometheus,
# Grafana, exporters) + demo-order workload. Mode B (Kafka, ES cluster, Thanos)
# bổ sung sau qua profile "scale". Loadgen bật qua profile "demo".
name: logmon

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: logmon
      # Fallback chỉ cho local dev — staging/production PHẢI set POSTGRES_PASSWORD.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logmon}
      POSTGRES_DB: logmon
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logmon -d logmon"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis: delivery queue cho notification BC (GĐ3.2, Redis Streams + consumer
  # group). Stack nhẹ vì notification là phần lõi GĐ3; rỗng REDIS_ADDR → worker tắt.
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Schema migrations qua golang-migrate (ADR: thay initdb để lặp lại được).
  # Chạy one-shot khi `up`, idempotent (track schema_migrations). Cũng dùng
  # cho `make migrate` / `make migrate-down`.
  migrate:
    image: migrate/migrate:v4.18.1
    restart: "no"
    volumes:
      - ../../backend/migrations:/migrations:ro
    command:
      - -path
      - /migrations
      - -database
      - postgres://logmon:${POSTGRES_PASSWORD:-logmon}@postgres:5432/logmon?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  # Khởi tạo volume rule-generated với quyền cho user nonroot (uid 65532 của
  # distroless): userservice ghi rule file, Prometheus mount read-only để đọc.
  genrules-init:
    image: busybox:1.37
    restart: "no"
    command: ["sh", "-c", "mkdir -p /data && chown -R 65532:65532 /data && chmod 0755 /data"]
    volumes:
      - genrules:/data

  userservice:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      # Binary self-check (image distroless không có wget/curl/shell).
      test: ["CMD", "/app/userservice", "healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    environment:
      PORT: "8080"
      LOG_LEVEL: info
      DATABASE_URL: postgres://logmon:${POSTGRES_PASSWORD:-logmon}@postgres:5432/logmon?sslmode=disable
      # JWT_SECRET nạp từ env của host; literal chỉ là fallback cho local dev.
      # Production PHẢI set JWT_SECRET (secret manager), KHÔNG dùng giá trị này.
      JWT_SECRET: ${JWT_SECRET:-local-dev-insecure-change-me}
      COOKIE_SECURE: "false"
      ALLOWED_ORIGIN: http://localhost:3000
      # Nới qua env khi E2E/CI (make e2e set cao để không bị throttle).
      AUTH_RATE_PER_MINUTE: ${AUTH_RATE_PER_MINUTE:-10}
      AUTH_RATE_BURST: ${AUTH_RATE_BURST:-5}
      # Rule sync pipeline (ADR-024): render rule file vào volume chung với Prometheus.
      RULES_DIR: /etc/prometheus/generated
      PROMETHEUS_URL: http://prometheus:9090
      # Silence proxy (GĐ2.4b): tạo/xoá/liệt kê silence trên Alertmanager. Khi
      # chạy stack nhẹ (không profile observability), AM chưa lên → /alerts/silences trả 502.
      ALERTMANAGER_URL: http://alertmanager:9093
      # Webhook receiver (GĐ2.3): PHẢI khớp secrets/logmon_webhook_token.txt mà
      # Alertmanager dùng. Rỗng → receiver fail-closed (mọi webhook trả 401).
      ALERTMANAGER_WEBHOOK_TOKEN: ${ALERTMANAGER_WEBHOOK_TOKEN:-local-dev-webhook-token}
      # Tracing (doc_v2/04 §2): rỗng → tắt. Stack nhẹ `make up` để rỗng (không có
      # OTel agent); `make up-full`/`up-demo` set otel-agent:4317 qua env recipe.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: userservice
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      # Log search API (GĐ2.8): truy vấn data stream logs-*. Rỗng → /logs tắt (stack
      # nhẹ `make up` không có ES); `make up-full`/`up-demo` set elasticsearch:9200.
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-}
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD:-local-dev-insecure}
      # Notification delivery (GĐ3.2): Redis Streams queue. Rỗng → worker tắt.
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Mã hóa config kênh at-rest (AES-GCM). Rỗng → derive từ JWT_SECRET (HMAC).
      # Production PHẢI set NOTIFICATION_ENCRYPTION_KEY (secret manager).
      NOTIFICATION_ENCRYPTION_KEY: ${NOTIFICATION_ENCRYPTION_KEY:-}
      NOTIFICATION_KEY_ID: ${NOTIFICATION_KEY_ID:-v1}
    volumes:
      - genrules:/etc/prometheus/generated
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      genrules-init:
        condition: service_completed_successfully

  # ── Demo workload (ADR-029) — sinh telemetry cho dev/test platform ──────────
  # profile demo: không chạy ở vòng lặp dev mặc định (make up). Bật: make up-demo.
  demo-order:
    profiles: [demo]
    build:
      context: ../../examples/demo-order
    restart: unless-stopped
    environment:
      PORT: "8081"
      ERROR_RATE: "0.05"
      EXTRA_LATENCY_MS: "200"
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:8081:8081"
    deploy:
      resources:
        limits:
          memory: 128m

  # Sinh traffic liên tục vào demo-order: docker compose --profile demo up -d
  loadgen:
    profiles: [demo]
    image: curlimages/curl:8.14.1
    restart: unless-stopped
    depends_on:
      - demo-order
    entrypoint: /bin/sh
    command:
      - -c
      - |
        while true; do
          curl -fsS -o /dev/null http://demo-order:8081/api/v1/orders || true
          if [ $$((RANDOM % 5)) -eq 0 ]; then
            curl -fsS -o /dev/null -X POST http://demo-order:8081/api/v1/orders \
              -H 'Content-Type: application/json' \
              -d '{"item":"laptop","quantity":2}' || true
          fi
          sleep 0.5
        done
    deploy:
      resources:
        limits:
          memory: 64m

  # ── Monitoring stack (doc_v2/04 + 05) ───────────────────────────────────────
  prometheus:
    profiles: [observability]
    image: prom/prometheus:v3.12.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      # Bắt buộc cho rule sync pipeline (ADR-024): POST /-/reload.
      - --web.enable-lifecycle
      # Exemplars: click datapoint → trace (doc_v2/04).
      - --enable-feature=exemplar-storage
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/rules:/etc/prometheus/rules:ro
      - genrules:/etc/prometheus/generated:ro   # rule render bởi alerting BC
      - promdata:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

  alertmanager:
    profiles: [observability]
    image: prom/alertmanager:v0.32.1
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ../alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - amdata:/alertmanager
    secrets:
      - slack_webhook_url
      - healthchecks_url
      - logmon_webhook_token
    ports:
      - "127.0.0.1:9093:9093"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m

  grafana:
    profiles: [observability]
    image: grafana/grafana:12.3.7
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      # Production PHẢI set GRAFANA_ADMIN_PASSWORD qua env/secret.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Cho ES datasource provisioning ($__env trong datasources.yml).
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-local-dev-insecure}
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      # 3000 dành cho frontend dev (pnpm dev) — Grafana map ra 3001.
      - "127.0.0.1:3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m

  node-exporter:
    profiles: [observability]
    image: quay.io/prometheus/node-exporter:v1.9.1
    restart: unless-stopped
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - --path.rootfs=/host
    ports:
      - "127.0.0.1:9100:9100"
    deploy:
      resources:
        limits:
          memory: 128m

  postgres-exporter:
    profiles: [observability]
    image: quay.io/prometheuscommunity/postgres-exporter:v0.18.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://logmon:${POSTGRES_PASSWORD:-logmon}@postgres:5432/logmon?sslmode=disable
    ports:
      - "127.0.0.1:9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m

  # ── Logs pipeline Mode A (doc_v2/03, ADR-018/019): agent → gateway → ES ────
  elasticsearch:
    profiles: [observability]
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    restart: unless-stopped
    environment:
      discovery.type: single-node
      # Auth BẬT (không tắt xpack.security — doc_v2/09 §6). TLS HTTP tắt cho
      # dev Mode A trong network nội bộ; production bật qua compose.prod.
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-local-dev-insecure}
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs -u elastic:$${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -qE '(green|yellow)'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

  # Bootstrap ILM policy + index template — one-shot, idempotent.
  es-init:
    profiles: [observability]
    image: curlimages/curl:8.14.1
    restart: "no"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-local-dev-insecure}
    volumes:
      - ../elasticsearch:/init:ro
    entrypoint: /bin/sh
    command: ["/init/init.sh"]

  otel-gateway:
    profiles: [observability]
    image: otel/opentelemetry-collector-contrib:0.154.0
    restart: unless-stopped
    # root để ghi persistent queue vào named volume (dev); prod hardening sau.
    user: "0"
    command: ["--config=/etc/otelcol/gateway.yaml"]
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-local-dev-insecure}
    volumes:
      - ../otel/gateway.yaml:/etc/otelcol/gateway.yaml:ro
      - otel-gateway-state:/var/lib/otelcol
    depends_on:
      elasticsearch:
        condition: service_healthy
      jaeger:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512m

  otel-agent:
    profiles: [observability]
    image: otel/opentelemetry-collector-contrib:0.154.0
    restart: unless-stopped
    # root để đọc /var/lib/docker/containers (json-file logs mọi container).
    user: "0"
    command: ["--config=/etc/otelcol/agent.yaml"]
    volumes:
      - ../otel/agent.yaml:/etc/otelcol/agent.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - otel-agent-state:/var/lib/otelcol
    depends_on:
      - otel-gateway
    deploy:
      resources:
        limits:
          memory: 256m

  # Jaeger v2 (ADR-020) — nhận OTLP từ gateway, hiển thị trace waterfall.
  # Dev: storage in-memory mặc định của image (đủ cho demo); production dùng ES
  # (index prefix jaeger-, doc_v2/04 §2.4). UI :16686.
  jaeger:
    profiles: [observability]
    image: jaegertracing/jaeger:2.10.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:16686:16686" # Jaeger UI
    deploy:
      resources:
        limits:
          memory: 512m

  elasticsearch-exporter:
    profiles: [observability]
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.9.0
    restart: unless-stopped
    command:
      - '--es.uri=http://elastic:${ELASTIC_PASSWORD:-local-dev-insecure}@elasticsearch:9200'
    ports:
      - "127.0.0.1:9114:9114"
    depends_on:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  pgdata:
  redisdata:  # delivery queue persistence cho notification BC (GĐ3.2)
  genrules:   # rule file alerting BC render → Prometheus đọc (rule sync pipeline)
  promdata:
  grafanadata:
  esdata:
  otel-agent-state:
  otel-gateway-state:
  amdata:

# Secrets file-based (doc_v2/10 §1) — copy từ *.example và điền URL thật:
#   cp secrets/slack_webhook_url.txt.example secrets/slack_webhook_url.txt
#   cp secrets/healthchecks_url.txt.example secrets/healthchecks_url.txt
#   cp secrets/logmon_webhook_token.txt.example secrets/logmon_webhook_token.txt
# Lưu ý: nội dung logmon_webhook_token.txt PHẢI khớp ALERTMANAGER_WEBHOOK_TOKEN
# của userservice (mặc định local: local-dev-webhook-token).
secrets:
  slack_webhook_url:
    file: ./secrets/slack_webhook_url.txt
  healthchecks_url:
    file: ./secrets/healthchecks_url.txt
  logmon_webhook_token:
    file: ./secrets/logmon_webhook_token.txt

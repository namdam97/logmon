apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: false

  # Logs (doc_v2/03): data streams logs-*, doc shape OTel-native.
  # Password lấy từ env ELASTIC_PASSWORD của container Grafana.
  - name: Elasticsearch
    type: elasticsearch
    uid: elasticsearch
    url: http://elasticsearch:9200
    access: proxy
    basicAuth: true
    basicAuthUser: elastic
    secureJsonData:
      basicAuthPassword: $__env{ELASTIC_PASSWORD}
    jsonData:
      index: "logs-*"
      timeField: "@timestamp"
      logMessageField: body.text
      logLevelField: severity_text
      # Correlation logs→traces (doc_v2/04 §2.4): mỗi log mang field trace_id
      # (do trace_parser ở agent ghi từ SpanContext OTel) → click mở đúng trace
      # trên Jaeger. datasourceUid trỏ datasource Jaeger phía trên.
      dataLinks:
        - field: trace_id
          datasourceUid: jaeger
          url: "$${__value.raw}"
          urlDisplayLabel: "View trace in Jaeger"
    editable: false

  # Traces (doc_v2/04 §2.4): Jaeger v2 nhận OTLP từ gateway. Liên kết
  # traces→logs (theo trace_id) cấu hình ở bước correlation khi log đã mang trace_id.
  - name: Jaeger
    type: jaeger
    uid: jaeger
    url: http://jaeger:16686
    access: proxy
    editable: false

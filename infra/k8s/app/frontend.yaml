# LogMon Frontend (Next.js standalone) — Phase III C1. Deployment + Service.
# Ingress route /api → userservice trực tiếp (same-origin), nên rewrite nội bộ
# của Next chỉ là fallback; vẫn set API_PROXY_TARGET cho nhất quán.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: logmon
  labels: { app.kubernetes.io/name: frontend, app.kubernetes.io/part-of: logmon }
spec:
  selector: { app.kubernetes.io/name: frontend }
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: logmon
  labels: { app.kubernetes.io/name: frontend, app.kubernetes.io/part-of: logmon }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: frontend }
  template:
    metadata:
      labels: { app.kubernetes.io/name: frontend, app.kubernetes.io/part-of: logmon }
    spec:
      containers:
        - name: frontend
          image: logmon/frontend:local
          imagePullPolicy: Never
          ports:
            - { name: http, containerPort: 3000 }
          env:
            - { name: NODE_ENV, value: production }
            - { name: API_PROXY_TARGET, value: http://userservice:8080 }
          # Next không có /healthz → probe /login (127.0.0.1 vì bind 0.0.0.0 IPv4).
          readinessProbe:
            httpGet: { path: /login, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /login, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { memory: 320Mi }

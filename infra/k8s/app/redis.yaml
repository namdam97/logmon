# Redis (Phase III C1) — delivery queue cho notification BC (Redis Streams,
# GĐ3.2). Deployment + PVC (1 replica, RWO). save 60 1 + appendonly no (như Mode A).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: logmon
  labels: { app.kubernetes.io/name: redis, app.kubernetes.io/part-of: logmon }
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: 1Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: logmon
  labels: { app.kubernetes.io/name: redis, app.kubernetes.io/part-of: logmon }
spec:
  selector: { app.kubernetes.io/name: redis }
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: logmon
  labels: { app.kubernetes.io/name: redis, app.kubernetes.io/part-of: logmon }
spec:
  replicas: 1
  strategy: { type: Recreate }   # RWO PVC: không cho 2 pod mount song song
  selector:
    matchLabels: { app.kubernetes.io/name: redis }
  template:
    metadata:
      labels: { app.kubernetes.io/name: redis, app.kubernetes.io/part-of: logmon }
    spec:
      securityContext: { fsGroup: 999 }
      containers:
        - name: redis
          image: redis:7.4-alpine
          args: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
          ports:
            - { name: redis, containerPort: 6379 }
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { memory: 256Mi }
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: redis-data }

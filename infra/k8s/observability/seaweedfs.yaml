# SeaweedFS (object store S3) — Phase III C7, backend cho Thanos (ADR-021, MinIO loại).
# 1 process master+volume+filer+s3. In-cluster network-isolated → S3 anonymous
# (không s3.config) cho đơn giản; Thanos ký request, SeaweedFS bỏ qua chữ ký khi
# không có identity. volumeSizeLimitMB nhỏ + volume.max cao (disk nhỏ → đủ slot).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-data
  namespace: observability
  labels: { app.kubernetes.io/name: seaweedfs, app.kubernetes.io/part-of: logmon }
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: observability
  labels: { app.kubernetes.io/name: seaweedfs, app.kubernetes.io/part-of: logmon }
spec:
  selector: { app.kubernetes.io/name: seaweedfs }
  ports:
    - { name: master, port: 9333, targetPort: 9333 }
    - { name: s3, port: 8333, targetPort: 8333 }
    - { name: filer, port: 8888, targetPort: 8888 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs
  namespace: observability
  labels: { app.kubernetes.io/name: seaweedfs, app.kubernetes.io/part-of: logmon }
spec:
  replicas: 1
  strategy: { type: Recreate }   # RWO PVC
  selector:
    matchLabels: { app.kubernetes.io/name: seaweedfs }
  template:
    metadata:
      labels: { app.kubernetes.io/name: seaweedfs, app.kubernetes.io/part-of: logmon }
    spec:
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:4.36
          args:
            - server
            - -dir=/data
            - -s3
            - -master.volumeSizeLimitMB=256
            - -volume.max=100
          ports:
            - { name: master, containerPort: 9333 }
            - { name: s3, containerPort: 8333 }
            - { name: filer, containerPort: 8888 }
          readinessProbe:
            httpGet: { path: /cluster/healthz, port: 9333 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 512Mi }
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: seaweedfs-data }

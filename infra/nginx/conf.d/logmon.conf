# LogMon reverse proxy (ADR-041). Entrypoint công khai duy nhất.
#  /            → frontend (Next.js standalone :3000)
#  /api/        → userservice (:8080)  — same-origin để CSRF double-submit hoạt động
#  /grafana/    → grafana (:3000)      — optional, sau auth Grafana
# TLS bắt buộc; HTTP chỉ phục vụ ACME challenge + redirect 301 sang HTTPS.

upstream logmon_api      { server userservice:8080; }
upstream logmon_frontend { server frontend:3000; }

# ── HTTP :80 — ACME HTTP-01 + redirect HTTPS ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt webroot (certbot ghi challenge vào volume chung).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    # Security headers (backend cũng set; nginx là phòng thủ lớp ngoài).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Docker embedded DNS — cho phép resolve upstream lúc request (biến) thay vì
    # lúc khởi động → nginx KHÔNG chết nếu service optional (grafana) chưa lên.
    resolver 127.0.0.11 valid=30s;

    # API → userservice. Forward proto/host để backend set Secure cookie + CORS đúng.
    location /api/ {
        proxy_pass http://logmon_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # Grafana (optional) — sub-path /grafana/ (GF_SERVER_SERVE_FROM_SUB_PATH).
    # Biến + resolver → request-time resolve; 502 (không phải chết nginx) nếu vắng.
    location /grafana/ {
        set $grafana_upstream grafana:3000;
        proxy_pass http://$grafana_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Phần còn lại → frontend.
    location / {
        proxy_pass http://logmon_frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# OTel Collector AGENT (doc_v2/03 §2.1, ADR-018) — chạy trên mỗi host.
# Tail Docker container logs → parse zerolog JSON → đẩy OTLP sang gateway.
# Trace pipeline (OTLP từ SDK) bổ sung ở GĐ2.

extensions:
  # Lưu offset đọc file — không đọc lại log cũ sau restart.
  file_storage:
    directory: /var/lib/otelcol

receivers:
  # Trace từ OTel SDK của các service (userservice → otel-agent:4317). GĐ2.
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
  filelog:
    include: [/var/lib/docker/containers/*/*-json.log]
    start_at: end
    storage: file_storage
    operators:
      # Operator 'container' tự xử lý format docker json-file (time, stream,
      # recombine partial lines) — body trở thành dòng log gốc của app.
      - type: container
      # Parse zerolog JSON; log không phải JSON (vd Postgres) giữ raw body.
      - type: json_parser
        if: body matches "^\\{"
        parse_from: body
        parse_to: attributes
        on_error: send_quiet
        severity:
          parse_from: attributes.level
      # service → resource attr chuẩn OTel (gateway route data stream theo đây).
      - type: move
        if: attributes.service != nil
        from: attributes.service
        to: resource["service.name"]
      # message → body (giữ trace_id/span_id là attribute thường ở GĐ1;
      # trace_parser chỉ dùng khi có W3C trace id thật từ OTel SDK — GĐ2).
      - type: move
        if: attributes.message != nil
        from: attributes.message
        to: body

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 192
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  otlp/gateway:
    endpoint: otel-gateway:4317
    # Network nội bộ single-host; multi-host → bật mTLS (doc_v2/09 §6).
    tls:
      insecure: true

service:
  extensions: [file_storage]
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    logs:
      receivers: [filelog]
      processors: [memory_limiter, batch]
      exporters: [otlp/gateway]
    # Trace chỉ forward thô lên gateway; tail_sampling + spanmetrics ở gateway
    # (mọi span của 1 trace phải về cùng gateway — doc_v2/04 §2.2).
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/gateway]

# OTel Collector CONSUMER — Mode B (profile scale, ADR-018/027).
# Đọc Kafka topic `otlp_logs` (do gateway-scale.yaml đẩy vào) → Elasticsearch
# data streams. Consumer group `otel-gateway` (doc_v2/03 §5). Vì gateway đã gắn
# data_stream.* trước khi vào Kafka, consumer chỉ batch + export ES.
#
# Persistent sending_queue (file-backed) giữ log khi ES down ngắn — nhưng Kafka
# mới là buffer chính: nếu ES sập lâu, consumer dừng commit offset, log nằm an
# toàn trong Kafka (retention 24h) cho tới khi ES hồi.

extensions:
  file_storage:
    directory: /var/lib/otelcol

receivers:
  kafka:
    brokers: [kafka:9092]
    # kafka receiver: topic mặc định của signal logs ĐÃ là `otlp_logs` (không cho
    # set logs::topic như exporter); chỉ cần encoding khớp gateway (otlp_proto).
    logs:
      encoding: otlp_proto
    group_id: otel-gateway
    initial_offset: latest

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    user: elastic
    password: ${env:ELASTIC_PASSWORD}
    retry:
      enabled: true
    sending_queue:
      enabled: true
      storage: file_storage

service:
  extensions: [file_storage]
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    logs:
      receivers: [kafka]
      processors: [memory_limiter, batch]
      exporters: [elasticsearch]

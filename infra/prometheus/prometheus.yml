global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    scrape_interval: 60s
    static_configs:
      - targets: [localhost:9090]

  - job_name: logmon-services
    scrape_interval: 15s
    static_configs:
      - targets:
          - userservice:8080
          - demo-order:8081

  - job_name: node
    scrape_interval: 60s
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: postgres
    scrape_interval: 60s
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: grafana
    scrape_interval: 60s
    static_configs:
      - targets: [grafana:3000]
